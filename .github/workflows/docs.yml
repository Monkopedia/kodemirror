name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - '**/src/commonMain/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-api-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Generate API docs
        run: ./gradlew :dokkaGenerate
      - uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: build/dokka/html/

  build-site:
    needs: build-api-docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r docs-site/requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: api-docs
          path: docs-site/docs/api/
      - name: Build site
        run: cd docs-site && mkdocs build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/site/

  deploy:
    needs: build-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ github.event.repository.homepage }}
    steps:
      - uses: actions/deploy-pages@v4
