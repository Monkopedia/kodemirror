name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Lint and test
        run: >-
          ./gradlew apiCheck jvmTest
          -x :collab:jvmTest
          :state:wasmJsTest
          :collab:wasmJsTest
          :lezer-common:wasmJsTest
          :lezer-highlight:wasmJsTest
          :lezer-lr:wasmJsTest
