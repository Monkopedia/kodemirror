<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Contrast Search</title>
  <style>
    body { margin: 0; padding: 0; background: #000000; }
    #editor { width: 800px; height: 600px; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "codemirror": "https://esm.sh/*codemirror@6.0.1",
        "@codemirror/state": "https://esm.sh/*@codemirror/state@6.4.1",
        "@codemirror/view": "https://esm.sh/*@codemirror/view@6.34.1",
        "@codemirror/language": "https://esm.sh/*@codemirror/language@6.10.6",
        "@codemirror/commands": "https://esm.sh/*@codemirror/commands@6.7.1",
        "@codemirror/search": "https://esm.sh/*@codemirror/search@6.5.8",
        "@codemirror/autocomplete": "https://esm.sh/*@codemirror/autocomplete@6.18.4",
        "@codemirror/lint": "https://esm.sh/*@codemirror/lint@6.8.4",
        "@codemirror/lang-javascript": "https://esm.sh/*@codemirror/lang-javascript@6.2.2",
        "@codemirror/theme-one-dark": "https://esm.sh/*@codemirror/theme-one-dark@6.1.2",
        "@lezer/common": "https://esm.sh/*@lezer/common@1.2.3",
        "@lezer/highlight": "https://esm.sh/*@lezer/highlight@1.2.1",
        "@lezer/javascript": "https://esm.sh/*@lezer/javascript@1.4.21",
        "@lezer/lr": "https://esm.sh/*@lezer/lr@1.4.2",
        "crelt": "https://esm.sh/*crelt@1.0.6",
        "style-mod": "https://esm.sh/*style-mod@4.1.2",
        "w3c-keyname": "https://esm.sh/*w3c-keyname@2.2.8"
      }
    }
  </script>
</head>
<body>
  <div id="editor"></div>

  <script type="module">
    import { basicSetup, EditorView } from "codemirror";
    import { javascript } from "@codemirror/lang-javascript";
    import { HighlightStyle, syntaxHighlighting } from "@codemirror/language";
    import { openSearchPanel, SearchQuery, setSearchQuery } from "@codemirror/search";
    import { tags } from "@lezer/highlight";

    const extremeContrastTheme = EditorView.theme({
      "&": { backgroundColor: "#000000", color: "#FFFFFF" },
      ".cm-content": { caretColor: "#00FF00" },
      "&.cm-focused .cm-cursor": { borderLeftColor: "#00FF00" },
      "&.cm-focused .cm-selectionBackground, .cm-selectionBackground, ::selection":
        { backgroundColor: "#9900FF99" },
      ".cm-activeLine": { backgroundColor: "#FFFF004D" },
      ".cm-gutters": {
        backgroundColor: "#550000",
        color: "#00FFFF",
        borderRight: "1px solid #FF00FF",
      },
      ".cm-activeLineGutter": { backgroundColor: "#00FF6666" },
      ".cm-foldPlaceholder": { color: "#FFD700" },
      ".cm-panels": { backgroundColor: "#000033" },
      ".cm-searchMatch": { backgroundColor: "#AAFF0080" },
      ".cm-searchMatch.cm-searchMatch-selected": { backgroundColor: "#FF440080" },
      ".cm-selectionMatch": { backgroundColor: "#00AAFF66" },
      "&.cm-focused .cm-matchingBracket": { backgroundColor: "#00FF0080" },
      "&.cm-focused .cm-nonmatchingBracket": { backgroundColor: "#FF000080" },
    }, { dark: true });

    const extremeContrastHighlight = HighlightStyle.define([
      { tag: tags.keyword, color: "#FF0080" },
      { tag: [tags.string, tags.inserted], color: "#00FF80" },
      { tag: [tags.number, tags.changed, tags.annotation], color: "#FF8000" },
      { tag: [tags.meta, tags.comment], color: "#808080" },
      { tag: [tags.function(tags.variableName), tags.labelName], color: "#00FFFF" },
      { tag: tags.variableName, color: "#FFFF00" },
      { tag: [tags.operator, tags.operatorKeyword], color: "#FF4040" },
      { tag: [tags.typeName, tags.className], color: "#8080FF" },
      { tag: tags.definition(tags.variableName), color: "#00A0FF" },
      { tag: [tags.name, tags.propertyName], color: "#FFA0A0" },
    ]);

    const doc = `function fibonacci(n) {
  if (n <= 1) return n;
  return fibonacci(n - 1) + fibonacci(n - 2);
}

// Calculate first 10 Fibonacci numbers
const results = [];
for (let i = 0; i < 10; i++) {
  results.push(fibonacci(i));
}
console.log(results);`;

    const view = new EditorView({
      doc,
      extensions: [
        basicSetup,
        javascript(),
        extremeContrastTheme,
        syntaxHighlighting(extremeContrastHighlight),
      ],
      parent: document.getElementById("editor"),
    });

    openSearchPanel(view);
    view.dispatch({
      effects: setSearchQuery.of(new SearchQuery({ search: "fibonacci" }))
    });
  </script>
</body>
</html>
