<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Active Line</title>
  <style>
    body { margin: 0; padding: 0; background: #1e1e1e; }
    #editor { width: 800px; height: 600px; }
  </style>
</head>
<body>
  <div id="editor"></div>

  <script type="module">
    import { EditorView, basicSetup } from "https://esm.sh/@codemirror/basic-setup@0.20.0";
    import { javascript } from "https://esm.sh/@codemirror/lang-javascript@6.2.2";
    import { oneDark } from "https://esm.sh/@codemirror/theme-one-dark@6.1.2";
    import { EditorState } from "https://esm.sh/@codemirror/state@6.4.1";

    const doc = `function fibonacci(n) {
  if (n <= 1) return n;
  return fibonacci(n - 1) + fibonacci(n - 2);
}

// Calculate first 10 Fibonacci numbers
const results = [];
for (let i = 0; i < 10; i++) {
  results.push(fibonacci(i));
}
console.log(results);`;

    // Place cursor on line 7 ("const results = [];")
    const cursorPos = doc.indexOf("const results");

    const state = EditorState.create({
      doc,
      selection: { anchor: cursorPos },
      extensions: [
        basicSetup,
        javascript(),
        oneDark,
      ],
    });

    const view = new EditorView({
      state,
      parent: document.getElementById("editor"),
    });

    view.focus();
  </script>
</body>
</html>
