site_name: Kodemirror
site_description: CodeMirror 6, ported to Kotlin Multiplatform and Compose
site_url: https://monkopedia.github.io/kodemirror/

repo_name: Monkopedia/kodemirror
repo_url: https://github.com/Monkopedia/kodemirror

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Guide:
      - guide/index.md
      - Architecture: guide/architecture.md
      - Data Model: guide/data-model.md
      - The View: guide/the-view.md
      - Extending: guide/extending.md
  - Examples:
      - examples/index.md
      - Basic Setup: examples/basic.md
      - Gradle Setup: examples/bundle.md
      - Dynamic Configuration: examples/config.md
      - Themes and Styling: examples/styling.md
      - Tab Handling: examples/tab.md
      - Read-Only Mode: examples/readonly.md
      - Programmatic Changes: examples/change.md
      - Selection Handling: examples/selection.md
      - Decorations: examples/decoration.md
      - Autocompletion: examples/autocompletion.md
      - Linting: examples/lint.md
      - Gutters: examples/gutter.md
      - Panels: examples/panel.md
      - Tooltips: examples/tooltip.md
      - Zebra Stripes: examples/zebra.md
      - Language Package: examples/lang-package.md
      - Mixed-Language Parsing: examples/mixed-language.md
      - Collaborative Editing: examples/collab.md
      - Split View: examples/split.md
      - Large Documents: examples/million.md
      - Bidirectional Text: examples/bidi.md
      - Inverted Effects: examples/inverted-effect.md
      - Internationalization: examples/translate.md
  - Reference:
      - reference/index.md
